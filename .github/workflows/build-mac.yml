name: Build Mac App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri App (Mac)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # action replaces __VERSION__ from tauri.conf.json
          releaseName: "UltimateTab v__VERSION__"
          releaseBody: "Download the .dmg file below to install on your Mac."
          releaseDraft: true
          prerelease: false

      # The tauri-action automatically uploads artifacts to a GitHub Release if tagged, but we can also manually upload the artifacts so they appear in the Actions tab.
      - name: Upload Mac Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UltimateTab-Mac
          path: src-tauri/target/release/bundle/dmg/*.dmg
